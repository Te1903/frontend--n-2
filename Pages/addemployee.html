<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Work Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-background-dark/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
<!-- Modal Container -->
<div class="bg-background-light dark:bg-[#2d2116] w-full max-w-lg rounded-xl shadow-2xl border border-primary/20 overflow-hidden">
<!-- Modal Header -->
<header class="flex items-center justify-between border-b border-primary/10 px-6 py-4 bg-primary/5">
<div class="flex items-center gap-3">
<div class="bg-primary/20 p-2 rounded-lg text-primary">
<span class="material-symbols-outlined">person_add</span>
</div>
<h2 class="text-xl font-bold tracking-tight">Thêm nhân viên mới</h2>
</div>
<button class="p-2 hover:bg-primary/10 rounded-full transition-colors text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Modal Content / Form -->
<div class="p-6 space-y-5">
<!-- Họ và tên -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Họ và tên</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">badge</span>
<input class="w-full pl-10 pr-4 py-3 bg-white dark:bg-[#3d2d1e] border border-primary/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Nhập họ và tên đầy đủ" type="text"/>
</div>
</div>
<!-- Tên đăng nhập -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Tên đăng nhập</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">alternate_email</span>
<input class="w-full pl-10 pr-4 py-3 bg-white dark:bg-[#3d2d1e] border border-primary/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Ví dụ: vuanh123" type="text"/>
</div>
</div>
<!-- Mật khẩu -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-white dark:bg-[#3d2d1e] border border-primary/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Nhập mật khẩu bảo mật" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Vai trò -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Vai trò</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">manage_accounts</span>
<select class="w-full pl-10 pr-4 py-3 bg-white dark:bg-[#3d2d1e] border border-primary/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none appearance-none transition-all dark:text-white">
<option disabled="" selected="" value="">Chọn vai trò</option>
<option value="manager">Quản lý</option>
<option value="cashier">Thu ngân</option>
<option value="kitchen">Bếp</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Trạng thái -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Trạng thái</label>
<div class="flex items-center h-[50px] px-4 bg-white dark:bg-[#3d2d1e] border border-primary/20 rounded-lg">
<label class="relative inline-flex items-center cursor-pointer w-full justify-between">
<span class="text-sm text-slate-600 dark:text-slate-400">Hoạt động</span>
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:right-[19px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
</div>
</div>
</div>
<!-- Modal Footer -->
<footer class="px-6 py-6 bg-primary/5 flex items-center justify-end gap-3 border-t border-primary/10">
<a class="px-6 py-2.5 rounded-lg font-semibold text-slate-600 dark:text-slate-300 hover:bg-primary/10 transition-colors" href="Employee_management.html">
                    Hủy
</a>
<button class="px-8 py-2.5 bg-primary hover:bg-primary/90 text-white rounded-lg font-bold shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-lg">check_circle</span>
                    Tạo tài khoản
                </button>
</footer>
</div>
</div>
</body></html>
