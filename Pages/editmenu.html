<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Work Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Work Sans", sans-serif;
        }
        .custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23f48c25' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="relative w-full max-w-2xl bg-white dark:bg-[#2d2116] rounded-xl shadow-2xl overflow-hidden border border-primary/10">
<!-- Header -->
<header class="flex items-center justify-between border-b border-primary/10 px-6 py-4 bg-white dark:bg-[#2d2116] sticky top-0 z-10">
<div class="flex items-center gap-3">
<div class="p-2 bg-primary/10 rounded-lg">
<span class="material-symbols-outlined text-primary">restaurant_menu</span>
</div>
<h2 class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100">Thêm / Chỉnh sửa Món ăn</h2>
</div>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-white/5 rounded-full transition-colors text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Form Content -->
<div class="p-6 space-y-6 max-h-[819px] overflow-y-auto">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Tên món ăn -->
<div class="col-span-2">
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-300">Tên món ăn</label>
<input class="w-full bg-slate-50 dark:bg-[#3d2d1e] border border-slate-200 dark:border-primary/20 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Ví dụ: Cơm Tấm Sườn Bì Chả" type="text"/>
</div>
<!-- Giá bán -->
<div>
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-300">Giá bán (VNĐ)</label>
<div class="relative">
<input class="w-full bg-slate-50 dark:bg-[#3d2d1e] border border-slate-200 dark:border-primary/20 rounded-lg pl-4 pr-12 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="0" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-medium text-slate-400">đ</span>
</div>
</div>
<!-- Loại món -->
<div>
<label class="block text-sm font-semibold mb-2 text-slate-700 dark:text-slate-300">Loại món</label>
<select class="custom-select w-full bg-slate-50 dark:bg-[#3d2d1e] border border-slate-200 dark:border-primary/20 rounded-lg px-4 py-3 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all appearance-none">
<option value="food">Đồ ăn</option>
<option value="drink">Nước uống</option>
<option value="dessert">Tráng miệng</option>
</select>
</div>
</div>
<!-- Hình ảnh món ăn -->
<div>
<label class="block text-sm font-semibold mb-3 text-slate-700 dark:text-slate-300">Hình ảnh món ăn</label>
<div class="flex flex-col items-center justify-center border-2 border-dashed border-primary/20 dark:border-primary/10 rounded-xl p-8 bg-slate-50 dark:bg-[#3d2d1e] hover:bg-slate-100 dark:hover:bg-[#463422] transition-colors cursor-pointer group">
<div class="mb-3 p-4 bg-primary/10 rounded-full group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl">add_a_photo</span>
</div>
<p class="text-sm font-medium text-slate-600 dark:text-slate-400">Nhấn để tải lên hoặc kéo thả hình ảnh</p>
<p class="text-xs text-slate-400 mt-1">Hỗ trợ JPG, PNG (Tối đa 5MB)</p>
</div>
<!-- Thumbnail Preview (Optional/Hidden) -->
<div class="mt-4 flex gap-3 overflow-x-auto pb-2">
<div class="relative w-20 h-20 rounded-lg overflow-hidden border border-primary/20 flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="Hình ảnh xem trước món cơm tấm sườn nướng" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCUuv3cw991Yi6h5LHfsNcudTxkLxmmx6GaZtyICZtj49NhVUvz5dK4tOYyRUcZpltwwpthe2rwarI2AHvOVqGDs59BI_eB1dLdbhGy40HfYXhJ4l0_iab7YG6wbDvIUsrEzOxdw1j7UrB5rDSuQzyycCNLVMHR98MsTOogbJZtmtWfFzOFmA2r0cev3P6NW3tr-jE00L8Rrm47dK2MP_QJei9c3lhQNzfYPdM5RrPXj4oFpw_oMNz9HFMLoZ-nVq75ysveHS-IU1M"/>
<button class="absolute top-1 right-1 bg-red-500 text-white rounded-full p-0.5 scale-75">
<span class="material-symbols-outlined text-[16px]">close</span>
</button>
</div>
</div>
</div>
<!-- Trạng thái -->
<div class="flex items-center justify-between p-4 bg-primary/5 dark:bg-primary/10 rounded-lg border border-primary/10">
<div>
<p class="text-sm font-semibold text-slate-900 dark:text-slate-100">Trạng thái kinh doanh</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Món ăn sẽ hiển thị trên thực đơn nếu đang bán</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-300 peer-focus:outline-none dark:bg-slate-600 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
<span class="ms-3 text-sm font-medium text-slate-700 dark:text-slate-300">Đang bán</span>
</label>
</div>
</div>
<!-- Footer Actions -->
<footer class="flex items-center justify-end gap-3 p-6 border-t border-primary/10 bg-white dark:bg-[#2d2116]">
<a class="px-6 py-2.5 text-sm font-bold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-white/5 rounded-lg transition-colors" href="Menu_Management.html">
                Hủy bỏ
</a>
<button class="px-8 py-2.5 text-sm font-bold text-white bg-primary hover:bg-primary/90 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-sm">save</span>
                Lưu món ăn
            </button>
</footer>
</div>
</body></html>
