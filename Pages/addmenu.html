<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Work Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Thêm Món Ăn Mới - Admin</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="w-full max-w-2xl bg-white dark:bg-zinc-900 rounded-xl shadow-2xl overflow-hidden border border-primary/10">
<!-- Modal Header -->
<div class="px-8 py-6 border-b border-primary/10 flex justify-between items-center">
<h2 class="text-2xl font-bold text-primary tracking-tight">Thêm Món Ăn Mới</h2>
<button class="text-slate-400 hover:text-primary transition-colors">
<span class="material-icons">close</span>
</button>
</div>
<!-- Modal Body / Form -->
<form class="p-8 space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Left Column: Basic Info -->
<div class="space-y-4">
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Tên món ăn</label>
<input class="w-full px-4 py-2.5 rounded-lg border border-primary/20 bg-background-light dark:bg-zinc-800 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="Nhập tên món ăn..." type="text"/>
</div>
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Giá bán (VNĐ)</label>
<input class="w-full px-4 py-2.5 rounded-lg border border-primary/20 bg-background-light dark:bg-zinc-800 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="Vd: 50000" type="number"/>
</div>
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Loại món</label>
<div class="relative">
<select class="w-full px-4 py-2.5 rounded-lg border border-primary/20 bg-background-light dark:bg-zinc-800 focus:ring-2 focus:ring-primary focus:border-transparent outline-none appearance-none cursor-pointer transition-all">
<option disabled="" selected="" value="">Chọn loại món</option>
<option value="starter">Khai vị</option>
<option value="main">Món chính</option>
<option value="dessert">Tráng miệng</option>
<option value="drink">Đồ uống</option>
</select>
<span class="material-icons absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
</div>
</div>
</div>
<!-- Right Column: Image Upload -->
<div class="space-y-4">
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Hình ảnh món ăn</label>
<div class="relative group h-[190px] w-full rounded-xl border-2 border-dashed border-primary/30 flex flex-col items-center justify-center bg-background-light/50 dark:bg-zinc-800/50 hover:bg-primary/5 transition-colors cursor-pointer">
<input class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
<span class="material-icons text-4xl text-primary/60 mb-2">cloud_upload</span>
<p class="text-xs text-slate-500 dark:text-slate-400 text-center px-4">Kéo thả hoặc nhấp để tải ảnh lên (JPG, PNG)</p>
<!-- Placeholder preview overlay -->
<img class="absolute inset-0 w-full h-full object-cover rounded-xl opacity-0 group-hover:opacity-10 transition-opacity" data-alt="Tươi ngon thực phẩm món ăn trang trí" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDERvb7BvMRKeiYJ-68XQrVkpVXXIzHOYU5kdY3XLFJRYJ40pisqRnXmQ3pG1zkvnkJfxAPV12nQFmFKS4D0Ic8b9HC0oUmKXcAZajawcXeMtvI7_xwxI-qf94-lOFpzcf1gyU21b5HYKqQBEhT96lFs_2r6jhFKAqzlEVyqkuxGBYZ-bwRSZtZIN9wauvueL1Fjjvsx9p-xqyazTfLfTojanJ6NI1_SuNJqLWMZTCgsGM6dvFciP7szjMIyOki1qc5KSB5WMHmtYQ"/>
</div>
</div>
</div>
<!-- Full Width Elements -->
<div class="space-y-4">
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300">Mô tả món ăn</label>
<textarea class="w-full px-4 py-2.5 rounded-lg border border-primary/20 bg-background-light dark:bg-zinc-800 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all resize-none" placeholder="Mô tả nguyên liệu, hương vị..." rows="3"></textarea>
</div>
<div class="flex items-center justify-between p-4 bg-primary/5 dark:bg-primary/10 rounded-xl border border-primary/10">
<div class="flex items-center gap-3">
<span class="material-icons text-primary">visibility</span>
<div>
<p class="text-sm font-semibold">Trạng thái hiển thị</p>
<p class="text-xs text-slate-500">Món ăn sẽ hiển thị ngay trên thực đơn</p>
</div>
</div>
<!-- Toggle Switch -->
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-11 h-6 bg-slate-300 peer-focus:outline-none dark:bg-zinc-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
<!-- Modal Footer / Buttons -->
<div class="flex flex-col sm:flex-row gap-3 pt-4">
<a class="ml-64 flex-1 px-6 py-3 rounded-lg border border-primary/30 text-primary font-semibold hover:bg-primary/5 transition-colors" href="Menu_Management.html" type="button">Hủy</a>
<button class="flex-[2] px-6 py-3 rounded-lg bg-primary text-white font-semibold hover:bg-primary/90 transition-transform active:scale-95 shadow-lg shadow-primary/20" type="submit">Thêm món</button>
</div>
</form>
</div>
</body></html>
