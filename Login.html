<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập - Hệ thống Quản lý Nhà hàng</title>
<!-- Google Font: Work Sans -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Font Awesome for Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              orange: '#f48c25',
              dark: '#1a1a1a',
              card: '#242424'
            }
          },
          fontFamily: {
            sans: ['Work Sans', 'sans-serif'],
          },
          borderRadius: {
            'round-eight': '8px',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-layout">
    body {
      background-color: #1a1a1a;
      color: #ffffff;
    }
    .gradient-btn {
      background: linear-gradient(135deg, #f48c25 0%, #d47416 100%);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .gradient-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(244, 140, 37, 0.3);
    }
    .role-tab.active {
      border-color: #f48c25;
      color: #f48c25;
      background-color: rgba(244, 140, 37, 0.1);
    }
    .input-field:focus {
      border-color: #f48c25;
      box-shadow: 0 0 0 2px rgba(244, 140, 37, 0.2);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
<!-- BEGIN: Main Login Container -->
<main class="w-full max-w-md" data-purpose="login-wrapper">
<!-- BEGIN: Role Selection Tabs -->
<div class="flex gap-4 mb-6" data-purpose="role-switcher">
<!-- Admin Role Button -->
<button class="role-tab active flex-1 flex flex-col items-center justify-center p-4 border-2 border-transparent bg-brand-card rounded-round-eight transition-all duration-300" id="admin-tab" onclick="switchRole('admin')">
<i class="fas fa-crown text-2xl mb-2"></i>
<span class="text-sm font-semibold">Quản trị viên</span>
</button>
<!-- Staff Role Button -->
<button class="role-tab flex-1 flex flex-col items-center justify-center p-4 border-2 border-transparent bg-brand-card rounded-round-eight transition-all duration-300" id="staff-tab" onclick="switchRole('staff')">
<i class="fas fa-id-card text-2xl mb-2"></i>
<span class="text-sm font-semibold">Nhân viên</span>
</button>
</div>
<!-- END: Role Selection Tabs -->
<!-- BEGIN: Login Form Card -->
<section class="bg-brand-card p-8 rounded-round-eight shadow-2xl" data-purpose="login-card">
<div class="text-center mb-8">
<h1 class="text-2xl font-bold text-white mb-2" id="login-title">Đăng nhập Quản trị viên</h1>
<p class="text-gray-400 text-sm">Vui lòng nhập thông tin để truy cập hệ thống</p>
</div>
<form class="space-y-6" id="login-form">
<!-- Username Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-300" for="username">Tên đăng nhập</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
<i class="fas fa-user"></i>
</span>
<input class="input-field w-full pl-10 pr-4 py-3 bg-brand-dark border border-gray-700 rounded-round-eight text-white placeholder-gray-500 focus:outline-none transition-colors" id="username" name="username" placeholder="Nhập tên đăng nhập" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-300" for="password">Mật khẩu</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
<i class="fas fa-lock"></i>
</span>
<input class="input-field w-full pl-10 pr-12 py-3 bg-brand-dark border border-gray-700 rounded-round-eight text-white placeholder-gray-500 focus:outline-none transition-colors" id="password" name="password" placeholder="Nhập mật khẩu" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-brand-orange transition-colors" onclick="togglePassword()" title="Hiện/Ẩn mật khẩu" type="button">
<i class="fas fa-eye" id="password-icon"></i>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="text-sm text-brand-orange hover:underline" href="#">Quên mật khẩu?</a>
</div>
<!-- Submit Button -->
<button class="gradient-btn w-full py-3 px-4 rounded-round-eight text-white font-bold text-lg shadow-lg" type="submit">
          Đăng nhập
        </button>
</form>
</section>
<!-- END: Login Form Card -->
<!-- BEGIN: Footer Copyright -->
<footer class="mt-8 text-center text-gray-500 text-xs" data-purpose="copyright">
<p>© 2023 Restaurant Management System. All rights reserved.</p>
</footer>
<!-- END: Footer Copyright -->
</main>
<!-- END: Main Login Container -->
<script data-purpose="ui-logic">
    /**
     * Toggles between Admin and Staff roles
     * @param {string} role - 'admin' or 'staff'
     */
    function switchRole(role) {
      const adminTab = document.getElementById('admin-tab');
      const staffTab = document.getElementById('staff-tab');
      const title = document.getElementById('login-title');

      if (role === 'admin') {
        adminTab.classList.add('active');
        staffTab.classList.remove('active');
        title.innerText = 'Đăng nhập Quản trị viên';
      } else {
        staffTab.classList.add('active');
        adminTab.classList.remove('active');
        title.innerText = 'Đăng nhập Nhân viên';
      }
     }
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if (user === "thungan" && pass === "123") {
    window.location.href = "Cashier/cashier.html";
  } else if (user === "quanly" && pass === "123") {
    window.location.href = "./Pages/Dashboard_Overview.html";
  } else {
    alert("Sai tài khoản hoặc mật khẩu!");
  }
}

    /**
     * Toggles password visibility
      */
  function togglePassword() {
    const passwordInput = document.getElementById('password');
    const icon = document.getElementById('password-icon');

    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      passwordInput.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  }

    // Prevent form submission for demo purposes
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      login();
    });
  </script>
</body>
</html>
