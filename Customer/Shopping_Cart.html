<div class="flex items-center justify-between mt-2">

</div>
<div class="flex justify-between items-center pt-2 mt-2 border-t border-slate-100 dark:border-primary/5">

<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-all active:scale-[0.98]">

</button>
<p class="text-center text-xs text-slate-400 dark:text-slate-500">
                Bằng việc nhấn đặt hàng, bạn đồng ý với các điều khoản của chúng tôi.
            </p>
